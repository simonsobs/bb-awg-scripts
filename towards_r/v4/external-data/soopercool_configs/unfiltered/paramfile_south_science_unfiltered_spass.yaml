ext_data_directory: &ext_data_dir /scratch/gpfs/SIMONSOBS/external_data_e2e
iso_directory: &iso_dir /scratch/gpfs/SIMONSOBS/sat-iso/v4
output_directory: &out_dir !path [*ext_data_dir, /v4/spectra/unfiltered/south/spass/science]
inputs_dir: &inputs_dir !path [*iso_dir, soopercool_inputs]
# signflip_dir: &sf_dir !path [*iso_dir, noise/satp1_20251216_full-dataset/signflip/south/]

map_sets:
  spass_f002_unfiltered:
    map_dir: !path [*ext_data_dir, /v4/unfiltered_ext_data/spass/maps/]
    beam_dir: !path [*inputs_dir, beams]
    map_template: "spass_car_geometry_sat_f090_coords_c.fits"
    beam_file: "beam_unity.dat"
    n_bundles: 1
    freq_tag: 2         # Freq. tag (e.g. useful to coadd freqs) Used the ext data one
    exp_tag: "spass"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    filtering_tag: "no_filter"  # tag only used for couplings and transfer function
  

####################
# Masking metadata #
####################
masks:
  # Specify coordinates if using a rectangular mask
  box_mask: null
  # Set to True if mask is calculated from the weights,
  # otherwise set to False to use the hits
  use_weights: False
  analysis_mask: /scratch/gpfs/SIMONSOBS/external_data_e2e/v4/spectra/filtered_satp1_f090_20260220/south/20251216_full-dataset/science/masks/analysis_mask.fits
  # When specifying this file, the mapset/bundle-specific hits files will
  # be ignored and instead a global hits file will be used (testing puroposes)
  global_hits: !path [*iso_dir, spectra/satp1/south/20251216_full-dataset/science/masks/normalized_hits.fits]
  # Path to products (binary)
  galactic_mask: !path [*inputs_dir, masks/mask_GAL070_coords_c_sat_f090_geometry.fits]
  point_source_catalog: null
  point_source_mask: null
  external_mask: null
  # Apodization details
  apod_radius: 10.0
  smoothing_radius: 10.0
  apod_radius_point_source: 1.0
  apod_type: "C1"

####################################
# Metadata related to the analysis #
####################################
## General parameters
general_pars:
  pix_type: car
  car_template: /scratch/gpfs/SIMONSOBS/so/science-readiness/geometry/sat_f090.fits
  nside: 512
  lmin: 2
  lmax: 803
  binning_file: /scratch/gpfs/SIMONSOBS/sat-iso/v4/spectra/satp1/south/20251216_full-dataset/science/binning/binning_car_lmax2700_deltal15.npz
  pure_B: False
  # Where the beam window is lower than beam_floor, set it to beam_floor
  beam_floor: 1.e-2
  compute_Dl: True

covariance:
  cov_num_sims: 200
  fiducial_cmb: null
  fiducial_dust: null
  fiducial_synch: null

transfer_settings:
  transfer_directory: /scratch/gpfs/SIMONSOBS/external_data_e2e/v4/spectra/unfiltered/

  external_couplings_dir: !path [*out_dir, couplings]