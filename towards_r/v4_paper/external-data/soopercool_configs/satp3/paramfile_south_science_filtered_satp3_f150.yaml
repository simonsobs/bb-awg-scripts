ext_data_directory: &ext_data_dir /scratch/gpfs/SIMONSOBS/users/sa5705/SO/ISO_v4_paper/
iso_directory: &iso_dir /scratch/gpfs/SIMONSOBS/sat-iso/v4_paper
output_directory: &out_dir !path [*ext_data_dir, /spectra/filtered_satp3_f150/south/full-dataset_20260417_noazss/science]
transfer_dir: &transfer_dir !path [*iso_dir, /scratch/gpfs/SIMONSOBS/sat-iso/v4_paper/spectra/satp3/south/full-dataset_20260417_noazss/science]
inputs_dir: &inputs_dir !path [*iso_dir, soopercool_inputs]
signflip_dir: &sf_dir !path [*iso_dir, noise/satp3_20260417_noazss/signflip/south/]

map_sets:
  satp3_f090_south_science:
    map_dir: !path [*iso_dir, bundling/satp3_20260417_noazss/south]
    beam_dir: !path [*inputs_dir, beams]
    map_template: "satp3_f090_science_bundle{id_bundle}_{map|hits}.fits"
    beam_file: "beam_unity.dat"
    n_bundles: 4          # Number of bundles
    freq_tag: 090         # Freq. tag (e.g. useful to coadd freqs)
    exp_tag: "satp3"      # Experiment tag (useful to get noise-bias free cross-split spectra)
    hits_tag: "satp3"
    filtering_tag: "satp3_f090_south_science"
  planck_f100_filtered_satp3_f150_south_science:
    map_dir: !path [*ext_data_dir, /filtered_ext_data_20260417_noazss/planck/f100/satp3/south/f150/coadded_maps]
    beam_dir: !path [*ext_data_dir, unfiltered_data/planck/beam_window_functions/]
    map_template: "planck_car_100_bundle{id_bundle}_res1.0amin_coords_c_bundle{id_bundle}_f150_science_{filtered|filtered_weights}.fits"
    beam_file: "beam_pol_100_long.txt"
    n_bundles: 2
    freq_tag: 100
    exp_tag: "planck"
    hits_tag: "flat"
    filtering_tag: "satp3_f150_south_science"  # tag only used for couplings and transfer function
  planck_f143_filtered_satp3_f150_south_science:
    map_dir: !path [*ext_data_dir, /filtered_ext_data_20260417_noazss/planck/f143/satp3/south/f150/coadded_maps]
    beam_dir: !path [*ext_data_dir, unfiltered_data/planck/beam_window_functions/]
    map_template: "planck_car_143_bundle{id_bundle}_res1.0amin_coords_c_bundle{id_bundle}_f150_science_{filtered|filtered_weights}.fits"
    beam_file: "beam_pol_143_long.txt"
    n_bundles: 2
    freq_tag: 143
    exp_tag: "planck"
    hits_tag: "flat"
    filtering_tag: "satp3_f150_south_science"  # tag only used for couplings and transfer function
  planck_f353_filtered_satp3_f150_south_science:
    map_dir: !path [*ext_data_dir, /filtered_ext_data_20260417_noazss/planck/f353/satp3/south/f150/coadded_maps]
    beam_dir: !path [*ext_data_dir, unfiltered_data/planck/beam_window_functions/]
    map_template: "planck_car_353_bundle{id_bundle}_res1.0amin_coords_c_bundle{id_bundle}_f150_science_{filtered|filtered_weights}.fits"
    beam_file: "beam_pol_353_long.txt"
    n_bundles: 2
    freq_tag: 353
    exp_tag: "planck"
    hits_tag: "flat"
    filtering_tag: "satp3_f150_south_science"  # tag only used for couplings and transfer function
  satp3_f150_south_science:
    map_dir: !path [*iso_dir, bundling/satp3_20260417_noazss/south]
    beam_dir: !path [*inputs_dir, beams]
    map_template: "satp3_f150_science_bundle{id_bundle}_{map|hits}.fits"
    beam_file: "beam_unity.dat"
    n_bundles: 4
    freq_tag: 150
    exp_tag: "satp3"
    hits_tag: "satp3"
    filtering_tag: "satp3_f150_south_science"
  

####################
# Masking metadata #
####################
masks:
  # Specify coordinates if using a rectangular mask
  box_mask: null
  # Set to True if mask is calculated from the weights,
  # otherwise set to False to use the hits
  use_weights: False
  analysis_mask: !path [*out_dir, masks/analysis_mask.fits]
  # When specifying this file, the mapset/bundle-specific hits files will
  # be ignored and instead a global hits file will be used (testing puroposes)
  global_hits: !path [*iso_dir, spectra/satp3/south/full-dataset_20260417_noazss/science/masks/normalized_hits.fits]
  # Path to products (binary)
  galactic_mask: !path [*inputs_dir, masks/mask_GAL070_coords_c_sat_f090_geometry.fits]
  point_source_catalog: null
  point_source_mask: null
  external_mask: null
  # Apodization details
  apod_radius: 10.0
  smoothing_radius: 10.0
  apod_radius_point_source: 1.0
  apod_type: "C1"

####################################
# Metadata related to the analysis #
####################################
## General parameters
general_pars:
  pix_type: car
  car_template: /scratch/gpfs/SIMONSOBS/so/science-readiness/geometry/sat_f090.fits
  nside: 512
  lmin: 2
  lmax: 803
  binning_file: /scratch/gpfs/SIMONSOBS/sat-iso/v4_paper/spectra/satp3/south/full-dataset_20260417_noazss/science/binning/binning_car_lmax2700_deltal15.npz
  pure_B: False
  # Where the beam window is lower than beam_floor, set it to beam_floor
  beam_floor: 1.e-2
  compute_Dl: True

covariance:
  hits_files:
    satp3: !path [*iso_dir, spectra/satp3/south/full-dataset_20260417_noazss/science/masks/normalized_hits.fits]
    flat: /scratch/gpfs/SIMONSOBS/users/sa5705/SO/ISO_v4_paper/homogeneous_hits_for_planck.fits
  cov_num_sims: 200
  fiducial_cmb: null
  fiducial_dust: null
  fiducial_synch: null

transfer_settings:
  transfer_directory: !path [*transfer_dir, transfer_functions]

  external_couplings_dir: !path [*transfer_dir, couplings]
  tf_est_num_sims: 19
  sim_id_start: 1
  # # For estimation
  # ## Number of sims for tf estimation and validation
  # ## Parameters of the PL sims used for TF estimation
  # power_law_pars_tf_est:
  #   amp: 1.0
  #   delta_ell: 15
  #   power_law_index: 2.
  # ## Optional beams applied on PL sims
  # # If true, beams will be applied only on the validation simulations. By default (false)
  # # beam are applied to both the estimation and validation sims,
  # # to account for potential effect of the beam on the TF (e.g. commutativity)
  # do_not_beam_est_sims: True
  # beams_list: []

  ## Path to the sims for TF estimation
  unfiltered_map_dir:
    satp3_f090_south_science: /scratch/gpfs/SIMONSOBS/sat-iso/v4/transfer_function/input_sims/
    satp3_f150_south_science: /scratch/gpfs/SIMONSOBS/sat-iso/v4/transfer_function/input_sims/
  unfiltered_map_template:
    satp3_f090_south_science: "{pure_type}_4.0arcmin_fwhm30.0_sim{id_sim:04d}_CAR.fits"
    satp3_f150_south_science: "{pure_type}_4.0arcmin_fwhm30.0_sim{id_sim:04d}_CAR.fits"
  filtered_map_dir:
    satp3_f090_south_science: /scratch/gpfs/SIMONSOBS/sat-iso/v4_paper/transfer_function/satp3_20260417_noazss/south/f090/full-dataset/coadded_sims
    satp3_f150_south_science: /scratch/gpfs/SIMONSOBS/sat-iso/v4_paper/transfer_function/satp3_20260417_noazss/south/f150/full-dataset/coadded_sims
  filtered_map_template:
    satp3_f090_south_science: "{pure_type}_1.0arcmin_fwhm30.0_sim{id_sim:04d}_CAR_bundle0_f090_science_filtered.fits"
    satp3_f150_south_science: "{pure_type}_1.0arcmin_fwhm30.0_sim{id_sim:04d}_CAR_bundle0_f150_science_filtered.fits"