# These parameters are accessible to all stages
chains_dir: &chains_dir out_forecast
covar_sacc: &covar_sacc out_forecast/cls_coadd.fits

global:
    nside: 256  # only important for plotting
    delta_ell: 10  # needed to generate fiducial spectra
    compute_dell: True
    # Number of simulations to run (ignored if empty)
    sim_ids: null
    # Path where copy of config file will be stored
    # config_copy: !path [*chains_dir, config_copy.yaml]
    config_copy: out_forecast/config_copy.yaml

    # Input data or sims
    data:
        # Path to sacc file with cross-split power spectra
        cells_coadded: *covar_sacc  # In this case, same as covar_sacc
        # Path to sacc file with noise power spectra
        cells_noise: null
        # Path to sacc file with fiducial power spectra
        cells_fiducial: null
        # Path to sacc file with cross-split power spectrum covariance
        # cells_coadded_cov: *covar_sacc
        cells_coadded_cov: *covar_sacc
        # Path to sacc file with best-fit power spectra
        cells_best_fit: out_forecast/cells_model.fits
        # Path to sacc file with auto- and cross-bundle power spectra
        cells_coadded_total: null
        # Path to sacc file with null-test power spectra
        cells_null: null
    
    map_sets:
        band1:
            beam_file: null
        band2:
            beam_file: null
        band3:
            beam_file: null
        band4:
            beam_file: null
        band5:
            beam_file: null
        band6:
            beam_file: null

theory_params:
    CMB:
        cmb_templates:
        - data/camb_lens_nobb.dat
        - data/camb_lens_r1.dat
        A_lens: 1.
        r_tensor: 0.
    dust:
        beta_d: 1.54
        alpha_d_EE: -0.32
        alpha_d_BB: -0.16
        A_d_EE: 56.
        A_d_BB: 28.
        nu0_d: 353.
        T_d: 20.
    synch:
        beta_s: -3.0
        alpha_s_EE: -0.7
        alpha_s_BB: -0.93
        A_s_EE: 9.
        A_s_BB: 1.6
        nu0_s: 23.

BBCompSep:
    output_dir: *chains_dir
    # Sampler type. Options are:
    #  - 'emcee': a full MCMC will be run using emcee.
    #  - 'fisher': only the Fisher matrix (i.e. the likelihood
    #        Hessian matrix) will be calculated around the fiducial
    #        parameters chosen as prior centers.
    #  - 'single_point': only the chi^2 at the value used as the
    #        center for all parameter priors will be calculated.
    #  - 'timing': will compute the average time taken by one
    #        likelihood computation.
    sampler: emcee
    # If you chose polychord:
    nlive: 50
    nrepeat: 50
    # If you chose emcee:
    nwalkers: 24
    n_iters: 5000
    # Resume sampling from earlier runs
    resume: False
    # Whether to write model best fits into sacc (otherwise into npz archive)
    predict_to_sacc: True
    # Likelihood type. Options are:
    #  - 'chi2': a standard chi-squared Gaussian likelihood.
    #  - 'h&l': Hamimeche & Lewis likelihood.
    likelihood_type: chi2
    # What is the starting point?
    r_init: 1.e-3
    # Which polarization channels do you want to include?
    # Can be ['E'], ['B'] or ['E','B'].
    pol_channels: ['B']
    # Scale cuts (will apply to all frequencies)
    l_min: 30
    l_max: 300

    # CMB model
    cmb_model:
        # Template power spectrum. Should contained the lensed power spectra
        # with r=0 and r=1 respectively.
        cmb_templates:
        - data/camb_lens_nobb.dat
        - data/camb_lens_r1.dat

        # Free parameters
        params:
            # tensor-to-scalar ratio
            # See below for the meaning of the different elements in the list.
            r_tensor: ['r_tensor', 'tophat', [-2., 0.00, 2.]]
            #r_tensor: ['r_tensor', 'fixed', [0.00]]
            # Lensing amplitude
            A_lens: ['A_lens', 'tophat', [0., 1., 2.]]
            #A_lens: ['A_lens', 'fixed', [1.0]]

    # Foreground model
    fg_model:
        # Include moment parameters?
        use_moments: False
        moments_lmax: 192

        # Add one section per component. They should be called `component_X`,
        # starting with X=1
        component_1:
            # Name for this component
            name: Dust
            # Type of SED. Should be one of the classes stored in fgbuster.components
            # https://github.com/fgbuster/fgbuster/blob/master/fgbuster/component_model.py
            sed: Dust
            # Type of power spectra for all possible polarization channel combinations.
            # Any combinations not added here will be assumed to be zero.
            # The names should be one of the classes in bbpower/fgcls.py
            cl:
                EE: ClPowerLaw
                BB: ClPowerLaw
            # Parameters of the SED
            sed_parameters:
                # The key can be anything you want, but each parameter in the model
                # must have a different name.
                # The first item in the list is the name of the parameter used by fgbuster
                # The second item is the type of prior. The last item are the numbers
                # necessary to define the prior. They should be:
                #  - Gaussian: [mean,sigma]
                #  - tophat: [lower edge, start value, upper edge]
                #  - fixed: [parameter value]
                # nu0-type parameters can only be fixed.
                beta_d: ['beta_d', 'Gaussian', [1.54, 0.11]]
                temp_d: ['temp', 'fixed', [20.]]
                nu0_d: ['nu0', 'fixed', [353.]]
            cl_parameters:
                # Same for power spectrum parameters
                # (broken down by polarization channel combinations)
                EE:
                   amp_d_ee: ['amp', 'tophat', [40., 56., 80.]]
                   alpha_d_ee: ['alpha', 'tophat', [-1., -0.32, 0.]]
                   l0_d_ee: ['ell0', 'fixed', [80.]]
                BB:
                   #amp_d_bb: ['amp', 'fixed', [28.]]
                   amp_d_bb: ['amp', 'tophat', [0., 46., 80.]]
                   #alpha_d_bb: ['alpha', 'fixed', [-0.16]]
                   alpha_d_bb: ['alpha', 'tophat', [-0.5, 0.0, 0.5]]
                   l0_d_bb: ['ell0', 'fixed', [80.]]
            # If this component should be correlated with any other, list them here
            cross:
                # In this case the list should contain:
                # [component name, prior type, prior parameters]
                #epsilon_ds: ['component_2', 'tophat', [-1., 0., 1.]]
                epsilon_ds: ['component_2', 'fixed', [0.]]
            # Moment parameters. Only relevant if set "use_moments" to "True"
            moments:
                # Define gammas for varying spectral indices of components
                gamma_d_beta : ['gamma_beta', 'tophat', [-6., -3.5, -2.]]
                amp_d_beta : ['amp_beta', 'tophat', [0., 0., 1]]

        component_2:
            name: Synchrotron
            sed: Synchrotron
            cl:
                EE: ClPowerLaw
                BB: ClPowerLaw
            sed_parameters:
                beta_s: ['beta_pl', 'Gaussian', [-3.0, 0.3]]
                #beta_s: ['beta_pl', 'fixed', [0.0]]
                nu0_s: ['nu0', 'fixed', [23.]]
            cl_parameters:
                EE:
                    #amp_s_ee: ['amp', 'tophat', [0., 4., "inf"]]
                    amp_s_ee: ['amp', 'tophat', [5., 9., 15.]]
                    alpha_s_ee: ['alpha', 'tophat', [-2., -0.7, 0.]]
                    l0_s_ee: ['ell0', 'fixed', [80.]]
                BB:
                    #amp_s_bb: ['amp', 'tophat', [0., 2., "inf"]]
                    amp_s_bb: ['amp', 'tophat', [0., 1.6, 4.]]
                    #amp_s_bb: ['amp', 'fixed', [0.]]
                    alpha_s_bb: ['alpha', 'tophat', [-2., -0.93, 0.]]
                    #alpha_s_bb: ['alpha', 'fixed', [0.]]
                    l0_s_bb: ['ell0', 'fixed', [80.]]
            # Moment parameters. Only relevant if set "use_moments" to "True"
            moments:
                # Define gammas for varying spectral indices of components
                gamma_s_beta : ['gamma_beta', 'tophat', [-6., -3.5, -2.]]
                amp_s_beta : ['amp_beta', 'tophat', [0., 0., 1]]

    # Add extra parameters for different systematics
    systematics:
        # Bandpass-related systematics
        bandpasses:
            # Add a section called bandpass_X for any bandpass you
            # want to add extra information for. They will be matched
            # with the tracers stored in the input SACC files.
            planck_f030_filtered_SATp3_f090_south_science:
                # Add a file for a frequency-dependent polarization angle
                # 2 columns: freq (GHz), phi (deg.).
                # If not present, this effect will be ignored.
                #phase_nu: "./examples/data/phase_3layer_lf_0.txt"
                # Parametrize different bandpass systematics
                parameters:
                    # Relative shift in mean bandpass frequency.
                    #shift_1: ['shift', 'Gaussian', [0., 0.01]]
                    # Relative gain variation.
                    #gain_1: ['gain', 'Gaussian', [1., 0.01]]
                    # Polarization angle (prior in units of radians).
                    # angle_1: ['angle', 'Gaussian', [0., 5.]]
                    # angle_1: ['angle', 'fixed', [5.]]
            planck_f100_filtered_SATp3_f090_south_science:
                #phase_nu: "./examples/data/phase_3layer_lf_0.txt"
                parameters:
                    #shift_2: ['shift', 'Gaussian', [0., 0.01]]
                    #gain_2: ['gain', 'Gaussian', [1., 0.01]]
                    #angle_2: ['angle', 'Gaussian', [0., 5.]]
                    # angle_2: ['angle', 'fixed', [5.]]
            planck_f143_filtered_SATp3_f090_south_science:
                #phase_nu: "./examples/data/phase_3layer_mf_0.txt"
                parameters:
                    #shift_4: ['shift', 'Gaussian', [0., 0.01]]
                    #gain_4: ['gain', 'Gaussian', [1., 0.01]]
                    #angle_3: ['angle', 'Gaussian', [0., 5.]]
            planck_f217_filtered_SATp3_f090_south_science:
                #phase_nu: "./examples/data/phase_3layer_uhf_0.txt"
                parameters:
                    #shift_5: ['shift', 'Gaussian', [0., 0.01]]
                    #gain_5: ['gain', 'Gaussian', [1., 0.01]]
                    #angle_4: ['angle', 'Gaussian', [0., 5.]]
            planck_f353_filtered_SATp3_f090_south_science:
                #phase_nu: "./examples/data/phase_3layer_uhf_0.txt"
                parameters:
                    #shift_6: ['shift', 'Gaussian', [0., 0.01]]
                    #gain_6: ['gain', 'Gaussian', [1., 0.01]]
                    #angle_5: ['angle', 'Gaussian', [0., 5.]]

BBPlotter:
    # MCMC chain file
    chain_file: !path [*chains_dir, emcee.npz]
    # chi2 npz file
    chi2_file: !path [*chains_dir, chi2.npz]

    # Output directory for plots
    plot_dir: !path [*chains_dir, plots]
    # HTML page with plots
    plots_page: !path [*chains_dir, plots_page.html]

    # Which polarization channels to plot
    pol_channels: ["B"]
    # Maximum and minimum ell between which things will be plotted
    lmin_plot: 30
    lmax_plot: 300
    # Add total coadds to C_ell plots?
    plot_cells_coadded_total: False
    # Add noise spectra to C_ell plots?
    plot_cells_noise: False
    # Plot null tests?
    plot_cells_null: False
    # Plot likelihood?
    plot_likelihood: True
    # List of parameters to plot
    params_plot: [r_tensor, A_lens, beta_d, amp_d_bb, alpha_d_bb, beta_s, amp_s_bb, alpha_s_bb]

    # "Truth" parameter values that will be plotted with posteriors
    truth:
        A_lens: 1
        r_tensor: 0
        beta_d: 1.54
        epsilon_ds: 0.
        alpha_d_bb: -0.16
        amp_d_bb: 28
        beta_s: -3.
        alpha_s_bb: -0.93
        amp_s_bb: 1.6
        gamma_d_beta: null
        amp_d_beta: 0
        gamma_s_beta: null
        amp_s_beta: 0
